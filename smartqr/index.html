<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>i-Solar App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Fallback meta redirect (helps on iOS) -->
  <meta http-equiv="refresh" content="2;url=https://visiontek.co.in">

  <script>
    (function () {
      var ua = navigator.userAgent || navigator.vendor || window.opera;

      // Android
      if (/android/i.test(ua)) {
        window.location.replace("https://play.google.com/store/apps/details?id=uni.UNI199C480");
      }

      // iOS
      else if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) {
        window.location.replace("https://apps.apple.com/us/app/i-solar/id1632580672");
      }

      // Others (Desktop, etc.)
      else {
        window.location.replace("https://visiontek.co.in");
      }
    })();
  </script>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 50px;
      background-color: #f5f5f5;
    }
    .box {
      background: white;
      padding: 20px;
      margin: auto;
      width: 90%;
      max-width: 400px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>
  <div class="box">
    <h2>Opening i-Solar App...</h2>
    <p>If you are not redirected automatically:</p>
    <p>
      <a href="https://play.google.com/store/apps/details?id=uni.UNI199C480">Download for Android</a><br><br>
      <a href="https://apps.apple.com/us/app/i-solar/id1632580672">Download for iPhone</a>
    </p>
  </div>
</body>
</html>
